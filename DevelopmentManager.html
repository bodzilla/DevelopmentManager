<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Development Manager</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #f4f5f7;
            --surface: #fff;
            --border: #e2e5ea;
            --text: #1a1c20;
            --text-secondary: #5f6570;
            --accent: #3b82f6;
            --accent-light: #dbeafe;
            --status-gray: #94a3b8;
            --status-amber: #f59e0b;
            --status-green: #22c55e;
            --connector: #b0b8c4;
            --shadow: 0 1px 3px rgba(0, 0, 0, .08), 0 1px 2px rgba(0, 0, 0, .06);
            --shadow-lg: 0 4px 12px rgba(0, 0, 0, .1);
            --radius: 10px;
            --node-w: 200px;
            --node-h: 78px;
            --h-gap: 110px;
            --v-gap: 48px;
            --hover-bg: #f0f1f3;
            --hover-border: #ccd0d5;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --danger-bg: #fef2f2;
            --node-hover-border: #c0c5cc;
            --overlay-bg: rgba(0, 0, 0, .25);
            --toast-bg: #1a1c20;
            --toast-color: #fff;
            --filter-hover: rgba(0, 0, 0, .05);
            --filter-active: rgba(0, 0, 0, .08);
        }

        [data-theme="dark"] {
            --bg: #181a1e;
            --surface: #23262b;
            --border: #353840;
            --text: #e4e6ea;
            --text-secondary: #9ca3af;
            --accent: #60a5fa;
            --accent-light: #1e3a5f;
            --connector: #5a6270;
            --shadow: 0 1px 3px rgba(0, 0, 0, .3), 0 1px 2px rgba(0, 0, 0, .2);
            --shadow-lg: 0 4px 12px rgba(0, 0, 0, .4);
            --hover-bg: #2c3038;
            --hover-border: #4a4e58;
            --accent-hover: #3b82f6;
            --danger: #f87171;
            --danger-hover: #ef4444;
            --danger-bg: #3b1c1c;
            --node-hover-border: #555a64;
            --overlay-bg: rgba(0, 0, 0, .5);
            --toast-bg: #e4e6ea;
            --toast-color: #181a1e;
            --filter-hover: rgba(255, 255, 255, .06);
            --filter-active: rgba(255, 255, 255, .1);
        }

        html,
        body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            user-select: none
        }

        /* ─── TOOLBAR ─── */
        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            z-index: 100
        }

        #toolbar h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -.3px;
            color: var(--text);
            white-space: nowrap
        }

        #toolbar .sep {
            width: 1px;
            height: 24px;
            background: var(--border)
        }

        .tb-btn {
            height: 34px;
            padding: 0 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all .15s;
            white-space: nowrap
        }

        .tb-btn:hover {
            background: var(--hover-bg);
            border-color: var(--hover-border)
        }

        .tb-btn:active {
            transform: scale(.97)
        }

        .tb-btn.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }

        .tb-btn.primary:hover {
            background: var(--accent-hover)
        }

        .tb-btn:disabled {
            opacity: .4;
            pointer-events: none
        }

        #toolbar .right {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center
        }

        /* ─── HAMBURGER DROPDOWNS ─── */
        .tb-hamburger {
            position: relative;
            display: none
        }

        .tb-hamburger-btn {
            height: 34px;
            padding: 0 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 8px;
            font-size: 16px;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all .15s
        }

        .tb-hamburger-btn:hover {
            background: var(--hover-bg);
            border-color: var(--hover-border)
        }

        .tb-hamburger-btn .ham-label {
            font-size: 12px;
            font-weight: 500
        }

        .tb-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 180px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: var(--shadow);
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 2px;
            z-index: 200
        }

        .tb-dropdown.right-align {
            left: auto;
            right: 0
        }

        .tb-dropdown.open {
            display: flex
        }

        .tb-dropdown .tb-btn {
            width: 100%;
            border: none;
            border-radius: 6px;
            justify-content: flex-start;
            height: 32px;
            font-size: 13px
        }

        .tb-dropdown .tb-btn:hover {
            background: var(--hover-bg)
        }

        .tb-dropdown .dd-sep {
            height: 1px;
            background: var(--border);
            margin: 4px 8px
        }

        /* Inline items that hide when hamburger appears */
        .tb-inline {
            display: flex;
            align-items: center;
            gap: 12px
        }

        @media (max-width: 1500px) {
            .tb-inline {
                display: none
            }

            .tb-hamburger {
                display: flex
            }
        }

        /* ─── LEGEND ─── */
        #legend {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            z-index: 90;
            box-shadow: var(--shadow);
            transition: right .2s ease
        }

        #legend.panel-open {
            right: 316px
        }

        #legend.panel-minimized {
            right: 52px
        }

        #legend.legend-collapsed #legend-rows,
        #legend.legend-collapsed #completion-stats,
        #legend.legend-collapsed #btn-customize {
            display: none
        }

        #legend.legend-collapsed h3 {
            margin-bottom: 0
        }

        .legend-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px
        }

        .legend-toggle {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: background .15s;
            flex-shrink: 0
        }

        .legend-toggle:hover {
            background: var(--hover-bg)
        }

        #legend h3 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-secondary);
            margin-bottom: 8px
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            margin-bottom: 5px
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #fff
        }

        /* ─── CANVAS ─── */
        #canvas-wrap {
            position: fixed;
            top: 52px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            cursor: grab
        }

        #canvas-wrap.grabbing {
            cursor: grabbing
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0
        }

        #connectors {
            position: absolute;
            top: 0;
            left: 0;
            overflow: visible;
            pointer-events: none
        }

        /* ─── EMPTY STATE ─── */
        #empty-state {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10
        }

        #empty-state p {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 16px
        }

        /* ─── NODE ─── */
        .node {
            position: absolute;
            width: var(--node-w);
            height: var(--node-h);
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 14px;
            cursor: pointer;
            transition: box-shadow .15s, border-color .15s, transform .15s
        }

        .node:hover {
            box-shadow: var(--shadow-lg);
            border-color: var(--node-hover-border)
        }

        .node.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light), var(--shadow-lg)
        }

        .node-name {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 155px
        }

        .node-status-row {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-top: 5px
        }

        .node-status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7px;
            color: #fff;
            transition: background .2s
        }

        .node-status-label {
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px
        }

        .node-status-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: background .15s
        }

        .node-status-btn:hover {
            background: var(--hover-bg)
        }

        /* ─── DEP BADGE ─── */
        .dep-badge {
            position: absolute;
            top: -6px;
            left: -6px;
            min-width: 16px;
            height: 16px;
            background: var(--border);
            color: var(--text-secondary);
            border-radius: 8px;
            font-size: 9px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px
        }

        /* ─── CONTEXT MENU ─── */
        #ctx-menu {
            position: fixed;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            min-width: 200px;
            padding: 4px;
            z-index: 200;
            display: none
        }

        #ctx-menu .item {
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 7px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background .1s
        }

        #ctx-menu .item:hover {
            background: var(--hover-bg)
        }

        #ctx-menu .item.danger {
            color: var(--danger)
        }

        #ctx-menu .item.danger:hover {
            background: var(--danger-bg)
        }

        #ctx-menu .item.disabled {
            color: var(--text-secondary);
            opacity: .5;
            pointer-events: none
        }

        #ctx-menu .divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0
        }

        /* ─── MODAL ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: var(--overlay-bg);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .15s
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto
        }

        .modal {
            background: var(--surface);
            border-radius: 14px;
            box-shadow: var(--shadow-lg);
            width: 380px;
            max-width: 92vw;
            padding: 24px;
            transform: scale(.95);
            transition: transform .15s
        }

        .modal-overlay.open .modal {
            transform: scale(1)
        }

        .modal h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px
        }

        .modal label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 5px
        }

        .modal input[type=text] {
            width: 100%;
            height: 38px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 12px;
            font-size: 14px;
            outline: none;
            transition: border-color .15s;
            background: var(--bg);
            color: var(--text)
        }

        .modal input[type=text]:focus {
            border-color: var(--accent)
        }

        .modal .field {
            margin-bottom: 14px
        }

        .modal .status-picker {
            display: flex;
            gap: 8px
        }

        .modal .status-option {
            flex: 1;
            padding: 10px 8px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all .15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px
        }

        .modal .status-option:hover {
            border-color: #b0b8c4
        }

        .modal .status-option.active {
            border-color: var(--accent);
            background: var(--accent-light)
        }

        .modal .status-option .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: #fff
        }

        .modal .actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px
        }

        .modal .actions button {
            height: 36px;
            padding: 0 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            transition: all .15s
        }

        .modal .actions button:hover {
            background: var(--hover-bg)
        }

        .modal .actions button.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }

        .modal .actions button.primary:hover {
            background: var(--accent-hover)
        }

        .modal .actions button.danger {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger)
        }

        .modal .actions button.danger:hover {
            background: var(--danger-hover)
        }

        /* ─── LINK BANNER ─── */
        #link-banner {
            position: fixed;
            top: 58px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #fff;
            padding: 8px 20px;
            border-radius: 0 0 10px 10px;
            font-size: 13px;
            font-weight: 500;
            z-index: 95;
            display: none;
            gap: 12px;
            align-items: center
        }

        #link-banner.show {
            display: flex
        }

        #link-banner button {
            background: rgba(255, 255, 255, .2);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px
        }

        #link-banner button:hover {
            background: rgba(255, 255, 255, .35)
        }

        /* ─── STATUS FILTER ─── */
        .node.dimmed {
            opacity: .15;
            pointer-events: none;
            transition: opacity .25s
        }

        .node.filter-match {
            opacity: 1;
            transition: opacity .25s
        }

        #connectors.has-filter .edge-group {
            opacity: .08;
            transition: opacity .25s
        }

        #connectors.has-filter .edge-group.filter-edge {
            opacity: 1;
            transition: opacity .25s
        }

        .legend-row {
            cursor: pointer;
            border-radius: 6px;
            padding: 2px 6px;
            margin-left: -6px;
            transition: background .15s
        }

        .legend-row:hover {
            background: var(--filter-hover)
        }

        .legend-row.active-filter {
            background: var(--filter-active);
            font-weight: 600
        }

        /* ─── LINK MODE ─── */
        #canvas-wrap.link-mode {
            cursor: crosshair
        }

        #canvas-wrap.link-mode .node {
            cursor: crosshair
        }

        #canvas-wrap.link-mode .node:hover {
            border-color: var(--accent);
            border-style: dashed
        }

        /* ─── TOAST ─── */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--toast-bg);
            color: var(--toast-color);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            opacity: 0;
            transition: all .25s;
            z-index: 400;
            pointer-events: none
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0)
        }

        /* ─── SIDE PANEL ─── */
        #side-panel {
            position: fixed;
            top: 52px;
            right: 0;
            bottom: 0;
            width: 300px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            box-shadow: var(--shadow);
            z-index: 90;
            transform: translateX(100%);
            transition: transform .2s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        #side-panel.open {
            transform: translateX(0)
        }

        #side-panel.minimized {
            width: 36px;
            min-width: 36px
        }

        #side-panel.minimized .sp-body {
            display: none
        }

        #side-panel.minimized .sp-header h3 {
            display: none
        }

        #side-panel.minimized .sp-header {
            justify-content: center;
            padding: 4px 0;
            flex-direction: column;
            border-bottom: none
        }

        #side-panel.minimized .sp-header-btns {
            flex-direction: column
        }

        #side-panel.minimized #sp-close {
            display: none
        }

        .sp-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0
        }

        .sp-header h3 {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0
        }

        .sp-header-btns {
            display: flex;
            gap: 4px
        }

        .sp-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: background .15s
        }

        .sp-btn:hover {
            background: var(--hover-bg)
        }

        .sp-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px
        }

        .sp-section {
            margin-bottom: 16px
        }

        .sp-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-secondary);
            margin-bottom: 6px
        }

        .sp-status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px
        }

        .sp-status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: #fff
        }

        .sp-node-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 13px;
            transition: background .1s;
            border: 1px solid var(--border);
            margin-bottom: 4px
        }

        .sp-node-item:hover {
            background: var(--hover-bg)
        }

        .sp-node-item .sp-item-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .sp-node-item .sp-item-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .sp-node-item .sp-item-label {
            font-size: 10px;
            color: var(--text-secondary);
            white-space: nowrap
        }

        .sp-empty {
            font-size: 12px;
            color: var(--text-secondary);
            font-style: italic
        }

        /* ─── STATUS DROPDOWN ─── */
        .status-dropdown {
            position: absolute;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            padding: 4px;
            z-index: 250;
            min-width: 180px;
            display: none
        }

        .status-dropdown.open {
            display: block
        }

        .status-dropdown .sd-item {
            padding: 7px 10px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background .1s
        }

        .status-dropdown .sd-item:hover {
            background: var(--hover-bg)
        }

        .status-dropdown .sd-item.active {
            background: var(--accent-light)
        }

        .status-dropdown .sd-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;

        }

        }

        }
    </style>
</head>

    <script>
        /* ═══════════════════════════════════════════
           DATA MODEL  (DAG — nodes can have multiple parents)
           ═══════════════════════════════════════════ */
        const DEFAULT_STATUSES = [
            { id: 'not-started', label: 'Dev Not Started', color: '#94a3b8', icon: '', complete: false },
            { id: 'in-flight', label: 'Dev In-flight', color: '#f59e0b', icon: '', complete: false },
            { id: 'qa', label: 'Dev Complete / QA', color: '#22c55e', icon: '✓', complete: true }
        ];

        let STATUSES = loadStatuses();

        function loadStatuses() {
            try {
                const raw = localStorage.getItem('tree-graph-statuses');
                if (raw) return JSON.parse(raw);
            } catch { }
            return JSON.parse(JSON.stringify(DEFAULT_STATUSES));
        }

        function saveStatuses() {
            try { localStorage.setItem('tree-graph-statuses', JSON.stringify(STATUSES)); } catch { }
        }

        let statusMap = new Map();
        function rebuildStatusMap() {
            statusMap.clear();
            for (const s of STATUSES) statusMap.set(s.id, s);
        }
        rebuildStatusMap();

        // Each node: { id, name, status, parentIds:[], children:[] }
        let nodes = new Map();
        let selectedId = null;
        let nextId = 1;

        const NODE_W = 200, NODE_H = 78, H_GAP = 110, V_GAP = 48;

        // Subtle colour palette for connectors — distinct enough to tell apart
        const CONN_COLORS = [
            '#8da4bf', '#b5a089', '#8fad8f', '#a893b5', '#b09090',
            '#7fb5b0', '#bf9f7f', '#9095ad', '#a5b57f', '#b08fa5',
        ];

        /* orientation */
        let isVertical = localStorage.getItem('tree-graph-orientation') === 'vertical';

        /* theme */
        let isDark = localStorage.getItem('tree-graph-theme') === 'dark';
        if (isDark) document.documentElement.setAttribute('data-theme', 'dark');

        /* linking mode */
        let linkMode = false;
        let linkSourceId = null;

        /* pan / zoom */
        let panX = 60, panY = 0, scale = 1;
        let isPanning = false, panStartX = 0, panStartY = 0;
        let didPan = false;

        /* ═══════════════════════════════════════════
           HELPERS
           ═══════════════════════════════════════════ */
        function getRoots() {
            return [...nodes.values()].filter(n => n.parentIds.length === 0).map(n => n.id);
        }

        const _escDiv = document.createElement('div');
        function esc(s) {
            _escDiv.textContent = s;
            return _escDiv.innerHTML;
        }

        /* ═══════════════════════════════════════════
           PERSISTENCE (localStorage)
           ═══════════════════════════════════════════ */
        const STORAGE_KEY = 'tree-graph-manager-data-v2';
        const MAX_HISTORY = 50;
        const undoStack = [];
        const redoStack = [];

        function getSnapshot() {
            return JSON.stringify({ nodes: [...nodes.entries()], nextId });
        }

        function restoreSnapshot(json) {
            const data = JSON.parse(json);
            nodes.clear();
            for (const [id, node] of data.nodes) {
                if (!node.parentIds) { node.parentIds = node.parentId != null ? [node.parentId] : []; delete node.parentId; }
                nodes.set(id, node);
            }
            nextId = data.nextId || nodes.size + 1;
        }

        let _batch = false;

        function saveState() {
            if (_batch) return;
            const snap = getSnapshot();
            if (undoStack._last !== undefined) {
                undoStack.push(undoStack._last);
                if (undoStack.length > MAX_HISTORY) undoStack.shift();
            }
            undoStack._last = snap;
            redoStack.length = 0;
            try { localStorage.setItem(STORAGE_KEY, snap); } catch { }
        }

        function undo() {
            if (undoStack.length === 0) return;
            redoStack.push(undoStack._last);
            if (redoStack.length > MAX_HISTORY) redoStack.shift();
            const prev = undoStack.pop();
            undoStack._last = prev;
            restoreSnapshot(prev);
            try { localStorage.setItem(STORAGE_KEY, prev); } catch { }
            selectedId = null;
            render();
            fitViewIfNeeded();
        }

        function redo() {
            if (redoStack.length === 0) return;
            undoStack.push(undoStack._last);
            if (undoStack.length > MAX_HISTORY) undoStack.shift();
            const next = redoStack.pop();
            undoStack._last = next;
            restoreSnapshot(next);
            try { localStorage.setItem(STORAGE_KEY, next); } catch { }
            selectedId = null;
            render();
            fitViewIfNeeded();
        }

        function loadState() {
            try {
                let raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) {
                    // migrate from v1 (single-parent tree format)
                    raw = localStorage.getItem('tree-graph-manager-data');
                    if (!raw) return;
                }
                const data = JSON.parse(raw);
                nodes = new Map(data.nodes);
                nextId = data.nextId || nodes.size + 1;
                // migrate old single-parent format → parentIds array
                for (const [, node] of nodes) {
                    if (!Array.isArray(node.parentIds)) {
                        node.parentIds = node.parentId ? [node.parentId] : [];
                        delete node.parentId;
                    }
                }
                saveState();
            } catch { }
        }

        /* ═══════════════════════════════════════════
           CYCLE DETECTION
           ═══════════════════════════════════════════ */
        function wouldCycle(fromId, toId) {
            // Would adding edge fromId → toId create a cycle?
            // Check if fromId is reachable from toId via existing children
            const visited = new Set();
            const stack = [toId];
            while (stack.length > 0) {
                const cur = stack.pop();
                if (cur === fromId) return true;
                if (visited.has(cur)) continue;
                visited.add(cur);
                const node = nodes.get(cur);
                if (node) for (const cid of node.children) stack.push(cid);
            }
            return false;
        }

        /* ═══════════════════════════════════════════
           CRUD
           ═══════════════════════════════════════════ */
        function isNameTaken(name, excludeId) {
            for (const [id, node] of nodes) {
                if (id !== excludeId && node.name.toLowerCase() === name.toLowerCase()) return true;
            }
            return false;
        }

        function createNode(name, status = 'not-started') {
            const id = 'node-' + (nextId++);
            nodes.set(id, { id, name, status, parentIds: [], children: [] });
            saveState();
            return id;
        }

        function addChild(parentId, name, status = 'not-started') {
            _batch = true;
            const id = createNode(name, status);
            addLink(parentId, id);
            _batch = false;
            saveState();
            return id;
        }

        function addLink(parentId, childId) {
            if (parentId === childId) { toast('Cannot link a node to itself'); return false; }
            const parent = nodes.get(parentId);
            const child = nodes.get(childId);
            if (!parent || !child) return false;
            if (child.parentIds.includes(parentId)) { toast('Link already exists'); return false; }
            if (wouldCycle(parentId, childId)) { toast('Cannot link — would create a cycle'); return false; }
            child.parentIds.push(parentId);
            parent.children.push(childId);
            saveState();
            return true;
        }

        function removeLink(parentId, childId) {
            const parent = nodes.get(parentId);
            const child = nodes.get(childId);
            if (!parent || !child) return;
            const pi = child.parentIds.indexOf(parentId);
            if (pi !== -1) child.parentIds.splice(pi, 1);
            const ci = parent.children.indexOf(childId);
            if (ci !== -1) parent.children.splice(ci, 1);
            saveState();
        }

        function insertBefore(childId, name, status = 'not-started') {
            const child = nodes.get(childId);
            if (!child) return;
            _batch = true;
            const newId = createNode(name, status);
            for (const pid of [...child.parentIds]) {
                removeLink(pid, childId);
                addLink(pid, newId);
            }
            addLink(newId, childId);
            _batch = false;
            saveState();
            return newId;
        }

        function deleteNode(id) {
            const node = nodes.get(id);
            if (!node) return;
            _batch = true;
            for (const pid of [...node.parentIds]) {
                removeLink(pid, id);
                for (const cid of node.children) {
                    if (!nodes.get(cid).parentIds.includes(pid)) addLink(pid, cid);
                }
            }
            for (const cid of [...node.children]) removeLink(id, cid);
            nodes.delete(id);
            if (selectedId === id) selectedId = null;
            _batch = false;
            saveState();
        }

        function deleteSubtree(id) {
            // delete the node + all descendants that are EXCLUSIVELY reachable through it
            const toRemove = new Set([id]);
            const _queue = [id];
            const _remaining = new Map();
            let _qi = 0;
            while (_qi < _queue.length) {
                const did = _queue[_qi++];
                const dn = nodes.get(did);
                if (!dn) continue;
                for (const cid of dn.children) {
                    if (toRemove.has(cid)) continue;
                    if (!_remaining.has(cid)) {
                        const child = nodes.get(cid);
                        let cnt = 0;
                        for (const pid of child.parentIds) if (!toRemove.has(pid)) cnt++;
                        _remaining.set(cid, cnt);
                    } else {
                        _remaining.set(cid, _remaining.get(cid) - 1);
                    }
                    if (_remaining.get(cid) <= 0) {
                        toRemove.add(cid);
                        _queue.push(cid);
                    }
                }
            }
            // clean up external links
            for (const did of toRemove) {
                const n = nodes.get(did);
                if (!n) continue;
                for (const pid of [...n.parentIds]) {
                    if (!toRemove.has(pid)) {
                        const p = nodes.get(pid);
                        const ci = p.children.indexOf(did);
                        if (ci !== -1) p.children.splice(ci, 1);
                    }
                }
                for (const cid of [...n.children]) {
                    if (!toRemove.has(cid)) {
                        const c = nodes.get(cid);
                        const pi = c.parentIds.indexOf(did);
                        if (pi !== -1) c.parentIds.splice(pi, 1);
                    }
                }
            }
            for (const did of toRemove) {
                nodes.delete(did);
                if (selectedId === did) selectedId = null;
            }
            saveState();
        }

        function renameNode(id, name) {
            const n = nodes.get(id);
            if (n) { n.name = name; }
        }

        function setNodeStatus(id, status) {
            const n = nodes.get(id);
            if (n) { n.status = status; }
        }

        /* ═══════════════════════════════════════════
           LAYOUT ENGINE  (Reingold-Tilford DAG layout)
           Reference: https://towardsdatascience.com/reingold-tilford-algorithm-explained-with-walkthrough-be5810e8ed93
           ═══════════════════════════════════════════ */
        const layoutCache = new Map(); // id → {x, y}

        function computeLayout() {
            layoutCache.clear();
            if (nodes.size === 0) return;

            const PRI_SIZE = isVertical ? NODE_H : NODE_W;
            const SEC_SIZE = isVertical ? NODE_W : NODE_H;
            const PRI_GAP = isVertical ? V_GAP + 30 : H_GAP;
            const SEC_GAP = isVertical ? H_GAP - 60 : V_GAP;
            const SIBLING_SEP = 1;   // in node-size units
            const SUBTREE_SEP = 1;   // in node-size units

            // 1. Connected components
            const compVis = new Set();
            const components = [];
            for (const [id] of nodes) {
                if (compVis.has(id)) continue;
                const comp = new Set();
                const stk = [id];
                while (stk.length > 0) {
                    const cur = stk.pop();
                    if (compVis.has(cur)) continue;
                    compVis.add(cur);
                    comp.add(cur);
                    const nd = nodes.get(cur);
                    for (const cid of nd.children) if (!compVis.has(cid)) stk.push(cid);
                    for (const pid of nd.parentIds) if (!compVis.has(pid)) stk.push(pid);
                }
                components.push(comp);
            }

            const COMP_GAP = SEC_GAP * 2;
            let compOffset = 0;

            for (const compSet of components) {
                // 2. Layer assignment via topological sort (longest path)
                const depth = new Map();
                const inDeg = new Map();
                for (const id of compSet) {
                    const node = nodes.get(id);
                    let pCount = 0;
                    for (const p of node.parentIds) if (compSet.has(p)) pCount++;
                    inDeg.set(id, pCount);
                    depth.set(id, 0);
                }
                const queue = [];
                for (const [id, deg] of inDeg) {
                    if (deg === 0) queue.push(id);
                }
                let qi = 0;
                while (qi < queue.length) {
                    const id = queue[qi++];
                    const node = nodes.get(id);
                    for (const cid of node.children) {
                        if (!compSet.has(cid)) continue;
                        depth.set(cid, Math.max(depth.get(cid), depth.get(id) + 1));
                        inDeg.set(cid, inDeg.get(cid) - 1);
                        if (inDeg.get(cid) === 0) queue.push(cid);
                    }
                }

                // 3. Build spanning tree: pick primary parent for each node
                //    Primary parent = the parent at the closest layer (most direct)
                const primaryParent = new Map();
                const treeChildren = new Map();
                for (const id of compSet) treeChildren.set(id, []);

                for (const id of compSet) {
                    const node = nodes.get(id);
                    if (node.parentIds.length === 0) continue;
                    let bestPid = null, bestDist = Infinity;
                    for (const pid of node.parentIds) {
                        if (!compSet.has(pid)) continue;
                        const dist = depth.get(id) - depth.get(pid);
                        if (dist < bestDist || (dist === bestDist && pid < bestPid)) {
                            bestDist = dist;
                            bestPid = pid;
                        }
                    }
                    if (bestPid !== null) {
                        primaryParent.set(id, bestPid);
                        treeChildren.get(bestPid).push(id);
                    }
                }

                // Collect roots (no primary parent in this component)
                const roots = [];
                for (const id of compSet) {
                    if (!primaryParent.has(id)) roots.push(id);
                }

                // 4. Reingold-Tilford layout on the spanning tree
                const rtX = new Map();    // preliminary x position in node-units
                const rtMod = new Map();  // mod shift for descendants

                // Pre-build sibling index: node → index in its parent's children list (avoids O(n) indexOf)
                const siblingIdx = new Map();
                for (const [, children] of treeChildren) {
                    for (let i = 0; i < children.length; i++) siblingIdx.set(children[i], i);
                }
                for (let i = 0; i < roots.length; i++) siblingIdx.set(roots[i], i);

                for (const id of compSet) {
                    rtX.set(id, 0);
                    rtMod.set(id, 0);
                }

                // ── First Pass: post-order traversal ──
                function firstPass(id) {
                    const children = treeChildren.get(id);
                    for (const cid of children) firstPass(cid);

                    const siblings = primaryParent.has(id)
                        ? treeChildren.get(primaryParent.get(id))
                        : roots;
                    const sibIdx = siblingIdx.get(id) ?? 0;

                    if (sibIdx === 0) {
                        // Leftmost child
                        if (children.length > 0) {
                            // Center over own children
                            const firstChild = rtX.get(children[0]);
                            const lastChild = rtX.get(children[children.length - 1]);
                            rtX.set(id, (firstChild + lastChild) / 2);
                        } else {
                            rtX.set(id, 0);
                        }
                    } else {
                        // Place sibling-distance to the right of left sibling
                        const leftSib = siblings[sibIdx - 1];
                        rtX.set(id, rtX.get(leftSib) + SIBLING_SEP);

                        if (children.length > 0) {
                            // Center over own children: compute mod
                            const firstChild = rtX.get(children[0]);
                            const lastChild = rtX.get(children[children.length - 1]);
                            const childMid = (firstChild + lastChild) / 2;
                            rtMod.set(id, rtX.get(id) - childMid);
                        }
                    }

                    // Part 2: Check contours for overlaps with left siblings
                    if (sibIdx > 0) {
                        for (let si = sibIdx - 1; si >= 0; si--) {
                            const leftSib = siblings[si];
                            const shift = computeShift(leftSib, id);
                            if (shift > 0) {
                                rtX.set(id, rtX.get(id) + shift);
                                if (children.length > 0) {
                                    rtMod.set(id, rtMod.get(id) + shift);
                                }
                                // Distribute shift among intermediate siblings
                                const numBetween = sibIdx - si;
                                if (numBetween > 1) {
                                    for (let mi = si + 1; mi < sibIdx; mi++) {
                                        const portion = shift * ((mi - si) / numBetween);
                                        rtX.set(siblings[mi], rtX.get(siblings[mi]) + portion);
                                        const midChildren = treeChildren.get(siblings[mi]);
                                        if (midChildren.length > 0) {
                                            rtMod.set(siblings[mi], rtMod.get(siblings[mi]) + portion);
                                        }
                                    }
                                }
                            }
                        }
                    }
                }

                // Compute the shift needed so right subtree doesn't overlap left subtree
                function computeShift(leftId, rightId) {
                    const leftContour = getRightContour(leftId);
                    const rightContour = getLeftContour(rightId);
                    const maxLevels = Math.min(leftContour.length, rightContour.length);
                    let maxShift = 0;
                    for (let lv = 0; lv < maxLevels; lv++) {
                        const gap = rightContour[lv] - leftContour[lv];
                        const needed = SUBTREE_SEP - gap;
                        if (needed > maxShift) maxShift = needed;
                    }
                    return maxShift > 0 ? maxShift : 0;
                }

                // Get right contour (rightmost x at each level) of subtree rooted at id
                function getRightContour(id) {
                    const contour = [];
                    function walk(nid, modSum, level) {
                        const x = rtX.get(nid) + modSum;
                        if (level >= contour.length) contour.push(x);
                        else if (x > contour[level]) contour[level] = x;
                        const newMod = modSum + rtMod.get(nid);
                        for (const cid of treeChildren.get(nid)) walk(cid, newMod, level + 1);
                    }
                    const mod = rtMod.get(id);
                    for (const cid of treeChildren.get(id)) walk(cid, mod, 0);
                    return contour;
                }

                // Get left contour (leftmost x at each level) of subtree rooted at id
                function getLeftContour(id) {
                    const contour = [];
                    function walk(nid, modSum, level) {
                        const x = rtX.get(nid) + modSum;
                        if (level >= contour.length) contour.push(x);
                        else if (x < contour[level]) contour[level] = x;
                        const newMod = modSum + rtMod.get(nid);
                        for (const cid of treeChildren.get(nid)) walk(cid, newMod, level + 1);
                    }
                    const mod = rtMod.get(id);
                    for (const cid of treeChildren.get(id)) walk(cid, mod, 0);
                    return contour;
                }

                // Run first pass on each root
                // Treat multiple roots as siblings of a virtual root
                for (const rid of roots) firstPass(rid);

                // Check contours between roots (treat as siblings)
                for (let ri = 1; ri < roots.length; ri++) {
                    for (let si = ri - 1; si >= 0; si--) {
                        const shift = computeShift(roots[si], roots[ri]);
                        if (shift > 0) {
                            rtX.set(roots[ri], rtX.get(roots[ri]) + shift);
                            if (treeChildren.get(roots[ri]).length > 0) {
                                rtMod.set(roots[ri], rtMod.get(roots[ri]) + shift);
                            }
                            const numBetween = ri - si;
                            if (numBetween > 1) {
                                for (let mi = si + 1; mi < ri; mi++) {
                                    const portion = shift * ((mi - si) / numBetween);
                                    rtX.set(roots[mi], rtX.get(roots[mi]) + portion);
                                    if (treeChildren.get(roots[mi]).length > 0) {
                                        rtMod.set(roots[mi], rtMod.get(roots[mi]) + portion);
                                    }
                                }
                            }
                        }
                    }
                }

                // ── Second Pass: pre-order traversal to compute final positions ──
                const finalX = new Map();
                let minFinalX = Infinity;

                function secondPass(id, modSum) {
                    const x = rtX.get(id) + modSum;
                    finalX.set(id, x);
                    if (x < minFinalX) minFinalX = x;
                    const newMod = modSum + rtMod.get(id);
                    for (const cid of treeChildren.get(id)) secondPass(cid, newMod);
                }

                for (const rid of roots) secondPass(rid, 0);

                // ── Third Pass: normalize (shift so minimum x is 0) ──
                if (minFinalX < 0) {
                    for (const [id, x] of finalX) finalX.set(id, x - minFinalX);
                }

                // ── Multi-parent nudge: gently adjust nodes toward all-parent centroid ──
                const columns = new Map();
                for (const [id, d] of depth) {
                    if (!columns.has(d)) columns.set(d, []);
                    columns.get(d).push(id);
                }
                // Sort each layer by finalX
                for (const [, col] of columns) {
                    col.sort((a, b) => finalX.get(a) - finalX.get(b));
                }

                let maxDepth = 0;
                for (const d of depth.values()) if (d > maxDepth) maxDepth = d;

                for (let d = 1; d <= maxDepth; d++) {
                    const col = columns.get(d);
                    if (!col) continue;
                    for (let ci = 0; ci < col.length; ci++) {
                        const id = col[ci];
                        const node = nodes.get(id);
                        if (node.parentIds.length <= 1) continue;
                        // Compute centroid of all parents
                        let sum = 0, cnt = 0;
                        for (const pid of node.parentIds) {
                            if (finalX.has(pid)) { sum += finalX.get(pid); cnt++; }
                        }
                        if (cnt === 0) continue;
                        const ideal = sum / cnt;
                        const cur = finalX.get(id);
                        // Bound by neighbors
                        const lo = ci > 0 ? finalX.get(col[ci - 1]) + SIBLING_SEP : -Infinity;
                        const hi = ci < col.length - 1 ? finalX.get(col[ci + 1]) - SIBLING_SEP : Infinity;
                        // Nudge up to 50% toward ideal
                        const target = cur + (ideal - cur) * 0.5;
                        finalX.set(id, Math.max(lo, Math.min(hi, target)));
                    }
                }

                // ── Convert to pixel coordinates and pack components ──
                let minS = Infinity, maxS = -Infinity;
                for (const id of compSet) {
                    const s = finalX.get(id) * (SEC_SIZE + SEC_GAP);
                    if (s < minS) minS = s;
                    if (s + SEC_SIZE > maxS) maxS = s + SEC_SIZE;
                }
                const shift = compOffset - minS;

                for (const id of compSet) {
                    const p = depth.get(id) * (PRI_SIZE + PRI_GAP);
                    const s = finalX.get(id) * (SEC_SIZE + SEC_GAP) + shift;
                    if (isVertical) {
                        layoutCache.set(id, { x: s, y: p });
                    } else {
                        layoutCache.set(id, { x: p, y: s });
                    }
                }
                compOffset = maxS + shift + COMP_GAP;
            }
        }

        /* ═══════════════════════════════════════════
           RENDERING
           ═══════════════════════════════════════════ */
        const canvasEl = document.getElementById('canvas');
        const svgEl = document.getElementById('connectors');
        const wrapEl = document.getElementById('canvas-wrap');

        function render() {
            computeLayout();
            renderNodes();
            renderConnectors();
            renderLegend();
            renderCompletionStats();
            renderSidePanel();
            updateToolbar();
            updateEmptyState();
            applyTransform();
            applyStatusFilter();
        }

        function renderNodes() {
            canvasEl.querySelectorAll('.node').forEach(el => el.remove());
            const frag = document.createDocumentFragment();

            for (const [id, pos] of layoutCache) {
                const node = nodes.get(id);
                const el = document.createElement('div');
                el.className = 'node' + (id === selectedId ? ' selected' : '');
                el.dataset.id = id;
                el.style.left = pos.x + 'px';
                el.style.top = pos.y + 'px';

                const st = statusMap.get(node.status);
                const badge = node.parentIds.length > 1
                    ? `<span class="dep-badge" title="${node.parentIds.length} dependencies">${node.parentIds.length}</span>` : '';
                el.innerHTML = `
      ${badge}
      <div class="node-name" title="${esc(node.name)}">${esc(node.name)}</div>
      <div class="node-status-row">
        <span class="node-status-dot ${node.status}" style="background:${st.color}">${st.icon}</span>
        <span class="node-status-label">${st.label}</span>
      </div>
      <button class="node-status-btn" title="Change status">▾</button>
    `;
                frag.appendChild(el);
            }
            canvasEl.appendChild(frag);
        }

        function renderConnectors() {
            svgEl.innerHTML = '';
            if (layoutCache.size === 0) return;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            const PAD = 6;
            const nodeRects = [];
            const selectedOverlays = [];
            for (const [id, pos] of layoutCache) {
                if (pos.x < minX) minX = pos.x;
                if (pos.y < minY) minY = pos.y;
                if (pos.x + NODE_W > maxX) maxX = pos.x + NODE_W;
                if (pos.y + NODE_H > maxY) maxY = pos.y + NODE_H;
                nodeRects.push({ id, x: pos.x - PAD, y: pos.y - PAD, w: NODE_W + PAD * 2, h: NODE_H + PAD * 2 });
            }
            svgEl.setAttribute('width', maxX - minX + NODE_W + 200);
            svgEl.setAttribute('height', maxY - minY + NODE_H + 200);
            svgEl.style.left = '0px';
            svgEl.style.top = '0px';

            // Collect edges
            const edges = [];
            for (const [id, node] of nodes) {
                const pPos = layoutCache.get(id);
                if (!pPos) continue;
                for (const cid of node.children) {
                    const cPos = layoutCache.get(cid);
                    if (!cPos) continue;
                    edges.push({ parentId: id, childId: cid, pPos, cPos });
                }
            }

            // Build adjacency: edges that share a node or visually intersect should differ in colour
            const edgeNeighbours = edges.map(() => new Set());

            // Fast shared-node detection via node → edge index
            const _nodeEdgeIdx = new Map();
            for (let i = 0; i < edges.length; i++) {
                for (const nid of [edges[i].parentId, edges[i].childId]) {
                    let list = _nodeEdgeIdx.get(nid);
                    if (!list) { list = []; _nodeEdgeIdx.set(nid, list); }
                    list.push(i);
                }
            }
            for (const eList of _nodeEdgeIdx.values()) {
                for (let a = 0; a < eList.length; a++) {
                    for (let b = a + 1; b < eList.length; b++) {
                        edgeNeighbours[eList[a]].add(eList[b]);
                        edgeNeighbours[eList[b]].add(eList[a]);
                    }
                }
            }

            // Bbox overlap for remaining non-neighbor pairs
            for (let i = 0; i < edges.length; i++) {
                const a = edges[i];
                const aMinX = Math.min(a.pPos.x, a.cPos.x), aMaxX = Math.max(a.pPos.x + NODE_W, a.cPos.x + NODE_W);
                const aMinY = Math.min(a.pPos.y, a.cPos.y), aMaxY = Math.max(a.pPos.y + NODE_H, a.cPos.y + NODE_H);
                for (let j = i + 1; j < edges.length; j++) {
                    if (edgeNeighbours[i].has(j)) continue;
                    const b = edges[j];
                    const bMinX = Math.min(b.pPos.x, b.cPos.x), bMaxX = Math.max(b.pPos.x + NODE_W, b.cPos.x + NODE_W);
                    const bMinY = Math.min(b.pPos.y, b.cPos.y), bMaxY = Math.max(b.pPos.y + NODE_H, b.cPos.y + NODE_H);
                    if (aMinX <= bMaxX && aMaxX >= bMinX && aMinY <= bMaxY && aMaxY >= bMinY) {
                        edgeNeighbours[i].add(j);
                        edgeNeighbours[j].add(i);
                    }
                }
            }

            // Greedy graph colouring: assign each edge the lowest colour index not used by its neighbours
            const edgeColorIdx = new Array(edges.length).fill(-1);
            for (let i = 0; i < edges.length; i++) {
                const usedColors = new Set();
                for (const ni of edgeNeighbours[i]) {
                    if (edgeColorIdx[ni] >= 0) usedColors.add(edgeColorIdx[ni]);
                }
                let c = 0;
                while (usedColors.has(c)) c++;
                edgeColorIdx[i] = c;
            }

            // Route each edge with obstacle avoidance
            const svgFrag = document.createDocumentFragment();
            for (let ei = 0; ei < edges.length; ei++) {
                const e = edges[ei];
                const d = routeEdge(e, nodeRects);
                const color = CONN_COLORS[edgeColorIdx[ei] % CONN_COLORS.length];

                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('class', 'edge-group');
                g.dataset.parent = e.parentId;
                g.dataset.child = e.childId;
                g.dataset.color = color;

                const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                hit.setAttribute('d', d);
                hit.setAttribute('class', 'connector-hit');
                hit.dataset.parent = e.parentId;
                hit.dataset.child = e.childId;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                line.setAttribute('d', d);
                line.setAttribute('class', 'connector-line');
                line.setAttribute('stroke', color);
                line.setAttribute('stroke-width', '2');
                line.setAttribute('fill', 'none');

                g.appendChild(hit);
                g.appendChild(line);

                // If this edge connects to the selected node, queue a highlight overlay
                if (selectedId && (e.parentId === selectedId || e.childId === selectedId)) {
                    const hl = line.cloneNode();
                    hl.setAttribute('class', 'connector-selected');
                    hl.setAttribute('stroke', highlightColor(color));
                    hl.setAttribute('stroke-width', '3');
                    hl.setAttribute('pointer-events', 'none');
                    selectedOverlays.push(hl);
                }

                // On hover: overlay a highlighted clone on top, remove on leave
                g.addEventListener('mouseenter', () => {
                    const old = svgEl.querySelector('.connector-highlight');
                    if (old) old.remove();
                    const hl = line.cloneNode();
                    hl.setAttribute('class', 'connector-highlight');
                    hl.setAttribute('stroke', highlightColor(color));
                    hl.setAttribute('stroke-width', '3.5');
                    hl.setAttribute('pointer-events', 'none');
                    svgEl.appendChild(hl);
                });
                g.addEventListener('mouseleave', () => {
                    const hl = svgEl.querySelector('.connector-highlight');
                    if (hl) hl.remove();
                });

                svgFrag.appendChild(g);
            }

            // Append selected-node connector overlays last so they render on top
            for (const hl of selectedOverlays) svgFrag.appendChild(hl);
            svgEl.appendChild(svgFrag);
        }

        /* Parse hex colour to [r,g,b] — cached to avoid repeated parseInt calls */
        const _hexCache = new Map();
        function parseHex(hex) {
            let rgb = _hexCache.get(hex);
            if (!rgb) {
                rgb = [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
                _hexCache.set(hex, rgb);
            }
            return rgb;
        }

        function _toHex(c) { return c.toString(16).padStart(2, '0'); }

        /* Darken a hex colour by a factor (0=black, 1=original) */
        function darkenColor(hex, factor) {
            const [r, g, b] = parseHex(hex);
            return '#' + _toHex(Math.round(r * factor)) + _toHex(Math.round(g * factor)) + _toHex(Math.round(b * factor));
        }

        /* Lighten a hex colour by blending toward white */
        function lightenColor(hex, amount) {
            const [r, g, b] = parseHex(hex);
            return '#' + _toHex(Math.min(255, Math.round(r + (255 - r) * amount))) + _toHex(Math.min(255, Math.round(g + (255 - g) * amount))) + _toHex(Math.min(255, Math.round(b + (255 - b) * amount)));
        }

        /* Precomputed highlight colours for the CONN_COLORS palette (rebuilt on theme toggle) */
        let _hlLight = null, _hlDark = null;
        function _buildHighlightCache() {
            _hlLight = new Map();
            _hlDark = new Map();
            for (const c of CONN_COLORS) {
                _hlLight.set(c, darkenColor(c, 0.6));
                _hlDark.set(c, lightenColor(c, 0.5));
            }
        }

        /* Pick highlight colour based on current theme */
        function highlightColor(hex) {
            if (!_hlLight) _buildHighlightCache();
            const cache = isDark ? _hlDark : _hlLight;
            return cache.get(hex) || (isDark ? lightenColor(hex, 0.5) : darkenColor(hex, 0.6));
        }

        /* Route a single edge around node obstacles using 90-degree segments.
           Supports both horizontal (left→right) and vertical (top→bottom) orientations. */
        function routeEdge(e, nodeRects) {
            if (isVertical) return routeEdgeVertical(e, nodeRects);
            return routeEdgeHorizontal(e, nodeRects);
        }

        function routeEdgeHorizontal(e, nodeRects) {
            const x1 = e.pPos.x + NODE_W;
            const y1 = e.pPos.y + NODE_H / 2;
            const x2 = e.cPos.x;
            const y2 = e.cPos.y + NODE_H / 2;

            if (y1 === y2) return `M${x1},${y1} H${x2}`;

            const colStep = NODE_W + H_GAP;
            const parentCol = Math.round(e.pPos.x / colStep);
            const childCol = Math.round(e.cPos.x / colStep);

            const gaps = [];
            for (let c = parentCol; c < childCol; c++) {
                const gapLeft = c * colStep + NODE_W;
                const gapRight = (c + 1) * colStep;
                gaps.push({ left: gapLeft, right: gapRight, mid: (gapLeft + gapRight) / 2 });
            }

            // Pre-filter nodeRects to exclude edge endpoints (done once per edge)
            const rects = [];
            for (const r of nodeRects) {
                if (r.id !== e.parentId && r.id !== e.childId) rects.push(r);
            }

            function hitsNodeAt(vx, yA, yB) {
                const lo = Math.min(yA, yB), hi = Math.max(yA, yB);
                for (const r of rects) {
                    if (vx >= r.x && vx <= r.x + r.w && hi >= r.y && lo <= r.y + r.h) return true;
                }
                return false;
            }

            function findClearY(gapX, fromY, toY) {
                if (!hitsNodeAt(gapX, fromY, toY)) return null;
                const lo = Math.min(fromY, toY), hi = Math.max(fromY, toY);
                let blockTop = Infinity, blockBot = -Infinity, found = false;
                for (const r of rects) {
                    if (gapX >= r.x && gapX <= r.x + r.w && r.y + r.h > lo && r.y < hi) {
                        if (r.y < blockTop) blockTop = r.y;
                        if (r.y + r.h > blockBot) blockBot = r.y + r.h;
                        found = true;
                    }
                }
                if (!found) return null;
                const aboveY = blockTop - NODE_H * 0.5;
                const belowY = blockBot + NODE_H * 0.5;
                const aboveCost = Math.abs(fromY - aboveY) + Math.abs(aboveY - toY);
                const belowCost = Math.abs(fromY - belowY) + Math.abs(belowY - toY);
                return aboveCost <= belowCost ? aboveY : belowY;
            }

            if (gaps.length === 1) {
                const gx = gaps[0].mid;
                const detourY = findClearY(gx, y1, y2);
                if (detourY === null) return `M${x1},${y1} H${gx} V${y2} H${x2}`;
                const seg1X = gaps[0].left + (gaps[0].right - gaps[0].left) * 0.25;
                const seg2X = gaps[0].left + (gaps[0].right - gaps[0].left) * 0.75;
                return `M${x1},${y1} H${seg1X} V${detourY} H${seg2X} V${y2} H${x2}`;
            }

            const points = [{ x: x1, y: y1 }];
            let curY = y1;

            for (let gi = 0; gi < gaps.length; gi++) {
                const gap = gaps[gi];
                const gx = gap.mid;
                const isLast = gi === gaps.length - 1;

                if (isLast) {
                    if (!hitsNodeAt(gx, curY, y2)) {
                        points.push({ x: gx, y: curY });
                        points.push({ x: gx, y: y2 });
                    } else {
                        const detourY = findClearY(gx, curY, y2);
                        if (detourY !== null) {
                            const seg1X = gap.left + (gap.right - gap.left) * 0.25;
                            const seg2X = gap.left + (gap.right - gap.left) * 0.75;
                            points.push({ x: seg1X, y: curY });
                            points.push({ x: seg1X, y: detourY });
                            points.push({ x: seg2X, y: detourY });
                            points.push({ x: seg2X, y: y2 });
                        } else {
                            points.push({ x: gx, y: curY });
                            points.push({ x: gx, y: y2 });
                        }
                    }
                } else {
                    const nextColX = (parentCol + gi + 1) * colStep;
                    let blockTop = Infinity, blockBot = -Infinity, hasCol = false;
                    for (const r of rects) {
                        if (r.x < nextColX + NODE_W && r.x + r.w > nextColX &&
                            curY >= r.y && curY <= r.y + r.h) {
                            if (r.y < blockTop) blockTop = r.y;
                            if (r.y + r.h > blockBot) blockBot = r.y + r.h;
                            hasCol = true;
                        }
                    }
                    if (hasCol) {
                        const aboveY = blockTop - NODE_H * 0.5;
                        const belowY = blockBot + NODE_H * 0.5;
                        const newY = Math.abs(aboveY - y2) <= Math.abs(belowY - y2) ? aboveY : belowY;
                        points.push({ x: gx, y: curY });
                        points.push({ x: gx, y: newY });
                        curY = newY;
                    }
                }
            }

            points.push({ x: x2, y: y2 });
            return buildPath(points);
        }

        function routeEdgeVertical(e, nodeRects) {
            const PRI_GAP = V_GAP + 30;
            const rowStep = NODE_H + PRI_GAP;

            const x1 = e.pPos.x + NODE_W / 2; // bottom-center of parent
            const y1 = e.pPos.y + NODE_H;
            const x2 = e.cPos.x + NODE_W / 2; // top-center of child
            const y2 = e.cPos.y;

            if (x1 === x2) return `M${x1},${y1} V${y2}`;

            const parentRow = Math.round(e.pPos.y / rowStep);
            const childRow = Math.round(e.cPos.y / rowStep);

            const gaps = [];
            for (let r = parentRow; r < childRow; r++) {
                const gapTop = r * rowStep + NODE_H;
                const gapBot = (r + 1) * rowStep;
                gaps.push({ top: gapTop, bot: gapBot, mid: (gapTop + gapBot) / 2 });
            }

            // Pre-filter nodeRects to exclude edge endpoints (done once per edge)
            const rects = [];
            for (const r of nodeRects) {
                if (r.id !== e.parentId && r.id !== e.childId) rects.push(r);
            }

            // Check if a horizontal segment at hy from xA to xB hits any node
            function hitsNodeH(hy, xA, xB) {
                const lo = Math.min(xA, xB), hi = Math.max(xA, xB);
                for (const r of rects) {
                    if (hy >= r.y && hy <= r.y + r.h && hi >= r.x && lo <= r.x + r.w) return true;
                }
                return false;
            }

            function findClearX(gapY, fromX, toX) {
                if (!hitsNodeH(gapY, fromX, toX)) return null;
                const lo = Math.min(fromX, toX), hi = Math.max(fromX, toX);
                let blockLeft = Infinity, blockRight = -Infinity, found = false;
                for (const r of rects) {
                    if (gapY >= r.y && gapY <= r.y + r.h && r.x + r.w > lo && r.x < hi) {
                        if (r.x < blockLeft) blockLeft = r.x;
                        if (r.x + r.w > blockRight) blockRight = r.x + r.w;
                        found = true;
                    }
                }
                if (!found) return null;
                const leftX = blockLeft - NODE_W * 0.5;
                const rightX = blockRight + NODE_W * 0.5;
                const leftCost = Math.abs(fromX - leftX) + Math.abs(leftX - toX);
                const rightCost = Math.abs(fromX - rightX) + Math.abs(rightX - toX);
                return leftCost <= rightCost ? leftX : rightX;
            }

            if (gaps.length === 1) {
                const gy = gaps[0].mid;
                const detourX = findClearX(gy, x1, x2);
                if (detourX === null) return `M${x1},${y1} V${gy} H${x2} V${y2}`;
                const seg1Y = gaps[0].top + (gaps[0].bot - gaps[0].top) * 0.25;
                const seg2Y = gaps[0].top + (gaps[0].bot - gaps[0].top) * 0.75;
                return `M${x1},${y1} V${seg1Y} H${detourX} V${seg2Y} H${x2} V${y2}`;
            }

            const points = [{ x: x1, y: y1 }];
            let curX = x1;

            for (let gi = 0; gi < gaps.length; gi++) {
                const gap = gaps[gi];
                const gy = gap.mid;
                const isLast = gi === gaps.length - 1;

                if (isLast) {
                    if (!hitsNodeH(gy, curX, x2)) {
                        points.push({ x: curX, y: gy });
                        points.push({ x: x2, y: gy });
                    } else {
                        const detourX = findClearX(gy, curX, x2);
                        if (detourX !== null) {
                            const seg1Y = gap.top + (gap.bot - gap.top) * 0.25;
                            const seg2Y = gap.top + (gap.bot - gap.top) * 0.75;
                            points.push({ x: curX, y: seg1Y });
                            points.push({ x: detourX, y: seg1Y });
                            points.push({ x: detourX, y: seg2Y });
                            points.push({ x: x2, y: seg2Y });
                        } else {
                            points.push({ x: curX, y: gy });
                            points.push({ x: x2, y: gy });
                        }
                    }
                } else {
                    const SEC_GAP = H_GAP - 60;
                    const nextRowY = (parentRow + gi + 1) * rowStep;
                    let blockLeft = Infinity, blockRight = -Infinity, hasRow = false;
                    for (const r of rects) {
                        if (r.y < nextRowY + NODE_H && r.y + r.h > nextRowY &&
                            curX >= r.x && curX <= r.x + r.w) {
                            if (r.x < blockLeft) blockLeft = r.x;
                            if (r.x + r.w > blockRight) blockRight = r.x + r.w;
                            hasRow = true;
                        }
                    }
                    if (hasRow) {
                        const leftX = blockLeft - NODE_W * 0.5;
                        const rightX = blockRight + NODE_W * 0.5;
                        const newX = Math.abs(leftX - x2) <= Math.abs(rightX - x2) ? leftX : rightX;
                        points.push({ x: curX, y: gy });
                        points.push({ x: newX, y: gy });
                        curX = newX;
                    }
                }
            }

            points.push({ x: x2, y: y2 });
            return buildPath(points);
        }

        function buildPath(points) {
            let d = `M${points[0].x},${points[0].y}`;
            for (let i = 1; i < points.length; i++) {
                const prev = points[i - 1];
                const cur = points[i];
                if (cur.y !== prev.y && cur.x !== prev.x) {
                    d += ` H${cur.x} V${cur.y}`;
                } else if (cur.x !== prev.x) {
                    d += ` H${cur.x}`;
                } else if (cur.y !== prev.y) {
                    d += ` V${cur.y}`;
                }
            }
            return d;
        }

        function applyTransform() {
            canvasEl.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
        }

        function updateEmptyState() {
            document.getElementById('empty-state').style.display = nodes.size === 0 ? 'block' : 'none';
        }

        // Cached toolbar button references (avoid repeated getElementById)
        const _tbBtns = {};
        const _tbIds = ['btn-add-child', 'btn-link', 'btn-insert-before', 'btn-edit', 'btn-delete', 'btn-undo', 'btn-redo'];
        for (const id of _tbIds) _tbBtns[id] = document.getElementById(id);

        // Cached proxy element references (avoid repeated querySelectorAll)
        const _proxyCache = new Map();
        function _getProxies(id) {
            let list = _proxyCache.get(id);
            if (!list) {
                list = Array.from(document.querySelectorAll(`[data-proxy="${id}"]`));
                _proxyCache.set(id, list);
            }
            return list;
        }

        function syncProxyState(id, disabled) {
            for (const p of _getProxies(id)) p.disabled = disabled;
        }

        function updateToolbar() {
            const hasSel = !!selectedId;
            _tbBtns['btn-add-child'].disabled = !hasSel;
            _tbBtns['btn-link'].disabled = !hasSel;
            _tbBtns['btn-insert-before'].disabled = !hasSel;
            _tbBtns['btn-edit'].disabled = !hasSel;
            _tbBtns['btn-delete'].disabled = !hasSel;
            _tbBtns['btn-undo'].disabled = undoStack.length === 0;
            _tbBtns['btn-redo'].disabled = redoStack.length === 0;
            syncProxyState('btn-add-child', !hasSel);
            syncProxyState('btn-link', !hasSel);
            syncProxyState('btn-insert-before', !hasSel);
            syncProxyState('btn-edit', !hasSel);
            syncProxyState('btn-delete', !hasSel);
            syncProxyState('btn-undo', undoStack.length === 0);
            syncProxyState('btn-redo', redoStack.length === 0);
        }

        /* ── Legend (dynamic from STATUSES) ── */
        let filterStatus = null;
        let _legendVersion = -1; // track when STATUSES change to avoid full innerHTML rebuild

        function renderLegend() {
            const container = document.getElementById('legend-rows');
            const curVersion = STATUSES.length + STATUSES.map(s => s.id + s.label + s.color + (s.icon || '')).join('|');
            if (_legendVersion !== curVersion) {
                // Full rebuild only when statuses actually changed
                _legendVersion = curVersion;
                container.innerHTML = STATUSES.map(s =>
                    `<div class="legend-row" data-filter-status="${s.id}"><span class="legend-dot" style="background:${s.color}">${s.icon || ''}</span> ${esc(s.label)}</div>`
                ).join('');
                container.querySelectorAll('[data-filter-status]').forEach(el => {
                    el.addEventListener('click', () => {
                        const sid = el.dataset.filterStatus;
                        filterStatus = (filterStatus === sid) ? null : sid;
                        applyStatusFilter();
                        renderLegend();
                    });
                });
            }
            // Toggle active class in-place (cheap DOM operation)
            container.querySelectorAll('[data-filter-status]').forEach(el => {
                el.classList.toggle('active-filter', filterStatus === el.dataset.filterStatus);
            });
        }

        function applyStatusFilter() {
            // Dim/undim nodes
            canvasEl.querySelectorAll('.node').forEach(el => {
                const node = nodes.get(el.dataset.id);
                if (!filterStatus || !node) {
                    el.classList.remove('dimmed', 'filter-match');
                } else if (node.status === filterStatus) {
                    el.classList.remove('dimmed');
                    el.classList.add('filter-match');
                } else {
                    el.classList.remove('filter-match');
                    el.classList.add('dimmed');
                }
            });
            // Dim/undim connectors
            const matchIds = new Set();
