            if (filterStatus) {
                for (const [id, node] of nodes) {
                    if (node.status === filterStatus) matchIds.add(id);
                }
            }
            svgEl.classList.toggle('has-filter', !!filterStatus);
            svgEl.querySelectorAll('.edge-group').forEach(g => {
                if (!filterStatus) {
                    g.classList.remove('filter-edge');
                } else {
                    const pid = g.dataset.parent;
                    const cid = g.dataset.child;
                    g.classList.toggle('filter-edge', matchIds.has(pid) || matchIds.has(cid));
                }
            });
        }

        /* ── Completion Stats ── */
        function renderCompletionStats() {
            const el = document.getElementById('completion-stats');
            const total = nodes.size;
            if (total === 0) { el.innerHTML = ''; return; }
            let complete = 0;
            for (const n of nodes.values()) {
                const st = statusMap.get(n.status);
                if (st && st.complete) complete++;
            }
            const pct = Math.round((complete / total) * 100);
            el.innerHTML = `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:4px">
        <span>${complete}/${total} complete</span>
        <span>${pct}%</span>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:#22c55e;border-radius:3px;transition:width .3s"></div>
      </div>
    </div>
  `;
        }

        /* ═══════════════════════════════════════════
           SIDE PANEL
           ═══════════════════════════════════════════ */
        const sidePanel = document.getElementById('side-panel');
        const spBody = document.getElementById('sp-body');
        const spTitle = document.getElementById('sp-title');
        let spMinimized = false;

        function renderSidePanel() {
            if (!selectedId) {
                sidePanel.classList.remove('open');
                document.getElementById('legend').classList.remove('panel-open', 'panel-minimized');
                return;
            }

            const node = nodes.get(selectedId);
            if (!node) { sidePanel.classList.remove('open'); document.getElementById('legend').classList.remove('panel-open', 'panel-minimized'); return; }

            sidePanel.classList.add('open');
            const legend = document.getElementById('legend');
            legend.classList.toggle('panel-open', !spMinimized);
            legend.classList.toggle('panel-minimized', spMinimized);
            const st = statusMap.get(node.status) || STATUSES[0];
            spTitle.textContent = node.name;

            function nodeItem(n) {
                const s = statusMap.get(n.status) || STATUSES[0];
                return `<div class="sp-node-item" data-goto="${n.id}" title="${esc(n.name)}">
      <span class="sp-item-dot" style="background:${s.color}"></span>
      <span class="sp-item-name">${esc(n.name)}</span>
      <span class="sp-item-label">${esc(s.label)}</span>
    </div>`;
            }

            const parents = node.parentIds.map(pid => nodes.get(pid)).filter(Boolean);
            const children = node.children.map(cid => nodes.get(cid)).filter(Boolean);

            spBody.innerHTML = `
    <div class="sp-section">
      <div class="sp-section-title">Status</div>
      <div class="sp-status-row">
        <span class="sp-status-dot" style="background:${st.color}">${st.icon || ''}</span>
        <span style="font-size:13px">${esc(st.label)}</span>
      </div>
    </div>

    <div class="sp-section">
      <div class="sp-section-title">Blockers / Dependencies (${parents.length})</div>
      ${parents.length > 0
                    ? parents.map(nodeItem).join('')
                    : '<div class="sp-empty">No dependencies — this work can start immediately</div>'
                }
    </div>

    <div class="sp-section">
      <div class="sp-section-title">Dependents / Children (${children.length})</div>
      ${children.length > 0
                    ? children.map(nodeItem).join('')
                    : '<div class="sp-empty">No dependent work items</div>'
                }
    </div>
  `;

            // Click to navigate to a node
            spBody.querySelectorAll('[data-goto]').forEach(el => {
                el.addEventListener('click', () => {
                    selectedId = el.dataset.goto;
                    render();
                    focusNode(selectedId);
                });
            });
        }

        document.getElementById('sp-close').addEventListener('click', () => {
            selectedId = null;
            sidePanel.classList.remove('open');
            document.getElementById('legend').classList.remove('panel-open', 'panel-minimized');
            render();
        });

        document.getElementById('sp-minimize').addEventListener('click', () => {
            spMinimized = !spMinimized;
            sidePanel.classList.toggle('minimized', spMinimized);
            document.getElementById('sp-minimize').textContent = spMinimized ? '◀' : '▶';
            const legend = document.getElementById('legend');
            legend.classList.toggle('panel-open', !spMinimized);
            legend.classList.toggle('panel-minimized', spMinimized);
        });

        /* ═══════════════════════════════════════════
           MODAL SYSTEM
           ═══════════════════════════════════════════ */
        const modalOverlay = document.getElementById('modal-overlay');
        const modalEl = document.getElementById('modal');

        function openModal(html) {
            modalEl.innerHTML = html;
            modalOverlay.classList.add('open');
            const inp = modalEl.querySelector('input[type=text]');
            if (inp) { inp.focus(); inp.select(); }
        }

        function closeModal() { modalOverlay.classList.remove('open'); }

        modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') { closeModal(); hideCtxMenu(); exitLinkMode(); }
        });

        /* ── Node Create / Edit Modal ── */
        function showNodeModal(opts) {
            const { title, name = '', onSave, editId = null } = opts;
            const status = opts.status || STATUSES[0].id;
            const statusHtml = STATUSES.map(s => `
    <div class="status-option${s.id === status ? ' active' : ''}" data-status="${s.id}">
      <span class="dot" style="background:${s.color}">${s.icon}</span>
      ${s.label}
    </div>`).join('');

            openModal(`
    <h2>${title}</h2>
    <div class="field">
      <label>Name</label>
      <input type="text" id="m-name" value="${esc(name)}" maxlength="60" placeholder="e.g. MVP-1">
    </div>
    <div class="field">
      <label>Status</label>
      <div class="status-picker" id="m-status">${statusHtml}</div>
    </div>
    <div class="actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" id="m-save">Save</button>
    </div>
  `);

            let selStatus = status;
            modalEl.querySelectorAll('.status-option').forEach(el => {
                el.addEventListener('click', () => {
                    modalEl.querySelectorAll('.status-option').forEach(o => o.classList.remove('active'));
                    el.classList.add('active');
                    selStatus = el.dataset.status;
                });
            });

            const saveBtn = document.getElementById('m-save');
            const nameInp = document.getElementById('m-name');

            function doSave() {
                const n = nameInp.value.trim();
                if (!n) { nameInp.style.borderColor = '#ef4444'; toast('Name is required'); return; }
                if (isNameTaken(n, editId)) { nameInp.style.borderColor = '#ef4444'; toast('A node with that name already exists'); return; }
                onSave(n, selStatus);
                closeModal();
            }

            saveBtn.addEventListener('click', doSave);
            nameInp.addEventListener('keydown', e => { if (e.key === 'Enter') doSave(); });
        }

        /* ── Confirm Modal ── */
        function showConfirm(message, onConfirm, btnLabel = 'Confirm', btnClass = 'danger') {
            openModal(`
    <h2>Confirm</h2>
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:20px">${message}</p>
    <div class="actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="${btnClass}" id="m-confirm">${btnLabel}</button>
    </div>
  `);
            document.getElementById('m-confirm').addEventListener('click', () => { onConfirm(); closeModal(); });
        }

        /* ── Delete Modal ── */
        function showDeleteModal(id) {
            const node = nodes.get(id);
            if (!node) return;

            if (node.children.length === 0) {
                showConfirm(`Delete <strong>${esc(node.name)}</strong>?`, () => { deleteNode(id); render(); fitViewIfNeeded(); });
                return;
            }

            openModal(`
    <h2>Delete ${esc(node.name)}</h2>
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:16px">This node has ${node.children.length} dependent(s). How do you want to proceed?</p>
    <div class="actions" style="flex-direction:column;gap:8px">
      <button class="primary" id="m-recon" style="width:100%;justify-content:center">Remove node &amp; reconnect dependents</button>
      <button class="danger" id="m-subtree" style="width:100%;justify-content:center">Delete node &amp; exclusive descendants</button>
      <button onclick="closeModal()" style="width:100%;justify-content:center">Cancel</button>
    </div>
  `);
            document.getElementById('m-recon').addEventListener('click', () => { deleteNode(id); closeModal(); render(); fitViewIfNeeded(); });
            document.getElementById('m-subtree').addEventListener('click', () => { deleteSubtree(id); closeModal(); render(); fitViewIfNeeded(); });
        }

        /* ═══════════════════════════════════════════
           CONTEXT MENU
        /* ═══════════════════════════════════════════
           STATUS CUSTOMIZATION
           ═══════════════════════════════════════════ */
        function showStatusCustomizer() {
            let draft = JSON.parse(JSON.stringify(STATUSES));

            function renderEditor() {
                const rows = draft.map((s, i) => `
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px" data-idx="${i}">
        <input type="color" value="${s.color}" style="width:32px;height:32px;border:1px solid var(--border);border-radius:6px;padding:2px;cursor:pointer" data-field="color">
        <input type="text" value="${esc(s.icon || '')}" style="width:36px;height:32px;border:1px solid var(--border);border-radius:6px;padding:0;font-size:14px;text-align:center;background:var(--bg);color:var(--text)" data-field="icon" placeholder="🔵" title="Icon (emoji)">
        <input type="text" value="${esc(s.label)}" style="flex:1;height:32px;border:1px solid var(--border);border-radius:6px;padding:0 8px;font-size:13px;background:var(--bg);color:var(--text)" data-field="label" placeholder="Status name">
        <label style="font-size:11px;display:flex;align-items:center;gap:3px;white-space:nowrap;cursor:pointer" title="Counts toward completion">
          <input type="checkbox" ${s.complete ? 'checked' : ''} data-field="complete"> Done
        </label>
        <button style="width:28px;height:28px;border:1px solid var(--border);background:transparent;border-radius:6px;cursor:pointer;font-size:14px;color:#ef4444;display:flex;align-items:center;justify-content:center" data-action="remove" ${draft.length <= 1 ? 'disabled' : ''} title="Remove">✕</button>
      </div>
    `).join('');

                openModal(`
      <h2>Customize Statuses</h2>
      <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">Define your workflow statuses. Mark "Done" for statuses that count toward completion.</p>
      <div id="status-editor">${rows}</div>
      <button class="tb-btn" id="sc-add" style="width:100%;justify-content:center;margin-top:4px;font-size:12px">+ Add Status</button>
      <div class="actions" style="margin-top:16px">
        <button onclick="closeModal()">Cancel</button>
        <button class="primary" id="sc-save">Save</button>
      </div>
    `);

                // Bind events
                modalEl.querySelectorAll('[data-idx]').forEach(row => {
                    const idx = parseInt(row.dataset.idx);
                    row.querySelector('[data-field="color"]').addEventListener('input', e => { draft[idx].color = e.target.value; });
                    row.querySelector('[data-field="icon"]').addEventListener('input', e => { draft[idx].icon = e.target.value.trim(); });
                    row.querySelector('[data-field="label"]').addEventListener('input', e => { draft[idx].label = e.target.value.trim(); });
                    row.querySelector('[data-field="complete"]').addEventListener('change', e => { draft[idx].complete = e.target.checked; });
                    row.querySelector('[data-action="remove"]')?.addEventListener('click', () => {
                        if (draft.length <= 1) return;
                        draft.splice(idx, 1);
                        renderEditor();
                    });
                });

                document.getElementById('sc-add').addEventListener('click', () => {
                    draft.push({ id: 'status-' + Date.now(), label: 'New Status', color: '#94a3b8', icon: '', complete: false });
                    renderEditor();
                });

                document.getElementById('sc-save').addEventListener('click', () => {
                    // Validate
                    for (const s of draft) {
                        if (!s.label) { toast('All statuses need a name'); return; }
                    }
                    // Assign stable IDs
                    draft.forEach((s, i) => { if (!s.id) s.id = 'status-' + i; });
                    STATUSES = draft;
                    saveStatuses();
                    rebuildStatusMap();
                    // Remap any node statuses that no longer exist
                    const validIds = new Set(STATUSES.map(s => s.id));
                    for (const [, node] of nodes) {
                        if (!validIds.has(node.status)) node.status = STATUSES[0].id;
                    }
                    saveState();
                    closeModal();
                    render();
                });
            }

            renderEditor();
        }

        /* ═══════════════════════════════════════════
           STATUS DROPDOWN
           ═══════════════════════════════════════════ */
        let activeDropdown = null;

        function showStatusDropdown(nodeId, btnEl) {
            closeStatusDropdown();
            const node = nodes.get(nodeId);
            if (!node) return;

            const dd = document.createElement('div');
            dd.className = 'status-dropdown open';
            dd.innerHTML = STATUSES.map(s => `
    <div class="sd-item${s.id === node.status ? ' active' : ''}" data-status="${s.id}">
      <span class="sd-dot" style="background:${s.color}">${s.icon}</span>
      ${s.label}
    </div>
  `).join('');

            // Position relative to the button
            const rect = btnEl.getBoundingClientRect();
            dd.style.position = 'fixed';
            dd.style.left = Math.min(rect.right + 4, window.innerWidth - 200) + 'px';
            dd.style.top = rect.top + 'px';

            dd.querySelectorAll('.sd-item').forEach(el => {
                el.addEventListener('click', (ev) => {
                    ev.stopPropagation();
                    setNodeStatus(nodeId, el.dataset.status);
                    saveState();
                    closeStatusDropdown();
                    render();
                });
            });

            document.body.appendChild(dd);
            activeDropdown = dd;

            // Close on next outside click
            setTimeout(() => {
                document.addEventListener('click', closeDropdownOnOutside);
            }, 0);
        }

        function closeStatusDropdown() {
            if (activeDropdown) { activeDropdown.remove(); activeDropdown = null; }
            document.removeEventListener('click', closeDropdownOnOutside);
        }

        function closeDropdownOnOutside(e) {
            if (activeDropdown && !activeDropdown.contains(e.target)) closeStatusDropdown();
        }

        /* ═══════════════════════════════════════════
           CONTEXT MENU
           ═══════════════════════════════════════════ */
        const ctxMenu = document.getElementById('ctx-menu');

        function showCtxMenu(x, y, items) {
            ctxMenu.innerHTML = items.map(i => {
                if (i.divider) return '<div class="divider"></div>';
                const cls = [i.danger ? 'danger' : '', i.disabled ? 'disabled' : ''].filter(Boolean).join(' ');
                return `<div class="item ${cls}" data-action="${i.action}">${i.icon || ''} ${i.label}</div>`;
            }).join('');
            ctxMenu.style.display = 'block';
            ctxMenu.style.left = Math.min(x, window.innerWidth - 220) + 'px';
            ctxMenu.style.top = Math.min(y, window.innerHeight - (items.length * 38 + 20)) + 'px';

            ctxMenu.querySelectorAll('.item:not(.disabled)').forEach(el => {
                el.addEventListener('click', () => {
                    hideCtxMenu();
                    const act = el.dataset.action;
                    items.find(i => i.action === act)?.handler?.();
                });
            });
        }

        function hideCtxMenu() { ctxMenu.style.display = 'none'; }

        /* ═══════════════════════════════════════════
           TOAST
           ═══════════════════════════════════════════ */
        let toastTimer;
        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
        }

        /* ═══════════════════════════════════════════
           LINK MODE
           ═══════════════════════════════════════════ */
        const linkBanner = document.getElementById('link-banner');
        const linkBannerText = document.getElementById('link-banner-text');

        function enterLinkMode(sourceId) {
            const node = nodes.get(sourceId);
            if (!node) return;
            linkMode = true;
            linkSourceId = sourceId;
            linkBannerText.textContent = `Click a node to make it a child of "${node.name}"`;
            linkBanner.classList.add('show');
            wrapEl.classList.add('link-mode');
        }

        function exitLinkMode() {
            linkMode = false;
            linkSourceId = null;
            linkBanner.classList.remove('show');
            wrapEl.classList.remove('link-mode');
        }

        document.getElementById('link-cancel').addEventListener('click', exitLinkMode);

        /* ═══════════════════════════════════════════
           EVENT HANDLERS
           ═══════════════════════════════════════════ */

        /* ── Canvas click (select / deselect / link) ── */
        let clickTimer = null;
        wrapEl.addEventListener('click', e => {
            if (didPan) { didPan = false; return; }
            if (!e.target.closest('.node') && !e.target.closest('#ctx-menu') && selectedId && !linkMode) {
                selectedId = null;
                render();
            }
        });
        canvasEl.addEventListener('click', e => {
            const nodeEl = e.target.closest('.node');

            if (!nodeEl) {
                return;
            }

            const id = nodeEl.dataset.id;

            // link mode: create edge source → clicked
            if (linkMode) {
                if (id === linkSourceId) { toast('Cannot link a node to itself'); return; }
                const ok = addLink(linkSourceId, id);
                if (ok) toast('Link created');
                exitLinkMode();
                render();
                fitViewIfNeeded();
                return;
            }

            // status dropdown button
            if (e.target.closest('.node-status-btn')) {
                e.stopPropagation();
                showStatusDropdown(id, e.target.closest('.node-status-btn'));
                return;
            }

            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => {
                const newSel = (selectedId === id) ? null : id;
                selectedId = newSel;
                render();
                if (newSel) focusNode(newSel);
            }, 250);
        });

        /* ── Double-click to edit ── */
        canvasEl.addEventListener('dblclick', e => {
            clearTimeout(clickTimer);
            if (linkMode) return;
            const nodeEl = e.target.closest('.node');
            if (!nodeEl) return;
            const id = nodeEl.dataset.id;
            const node = nodes.get(id);
            showNodeModal({
                title: 'Edit Node',
                name: node.name,
                status: node.status,
                editId: id,
                onSave(name, status) { renameNode(id, name); setNodeStatus(id, status); saveState(); render(); }
            });
        });

        /* ── Right-click context menu ── */
        canvasEl.addEventListener('contextmenu', e => {
            e.preventDefault();
            if (linkMode) { exitLinkMode(); return; }
            const nodeEl = e.target.closest('.node');
            if (!nodeEl) { hideCtxMenu(); return; }
            const id = nodeEl.dataset.id;
            selectedId = id;
            render();

            const node = nodes.get(id);
            const items = [
                {
                    label: 'Add Child', icon: '＋', action: 'add-child', handler() {
                        showNodeModal({ title: 'Add Child Node', onSave(n, s) { addChild(id, n, s); render(); fitViewIfNeeded(); } });
                    }
                },
                {
                    label: 'Additional Child', icon: '＋', action: 'link', handler() {
                        enterLinkMode(id);
                    }
                },
                {
                    label: 'Add Parent', icon: '↑', action: 'insert', handler() {
                        showNodeModal({ title: 'Add Parent Node', onSave(n, s) { insertBefore(id, n, s); render(); fitViewIfNeeded(); } });
                    }
                },
                { divider: true },
                {
                    label: 'Edit', icon: '✎', action: 'edit', handler() {
                        showNodeModal({
                            title: 'Edit Node', name: node.name, status: node.status,
                            editId: id,
                            onSave(n, s) { renameNode(id, n); setNodeStatus(id, s); saveState(); render(); }
                        });
                    }
                },
                { divider: true },
                { label: 'Delete', icon: '✕', action: 'delete', danger: true, handler() { showDeleteModal(id); } }
            ];
            showCtxMenu(e.clientX, e.clientY, items);
        });

        /* ── Pick-node modal (for Add Dependency) ── */
        function showPickNodeModal(title, description, excludeId, onPick) {
            const eligible = [...nodes.values()].filter(n => {
                if (n.id === excludeId) return false;
                // already a parent
                if (nodes.get(excludeId).parentIds.includes(n.id)) return false;
                // would create a cycle
                if (wouldCycle(n.id, excludeId)) return false;
                return true;
            });

            if (eligible.length === 0) {
                toast('No eligible nodes to link');
                return;
            }

            const listHtml = eligible.map(n => {
                const st = statusMap.get(n.status);
                return `<div class="item" data-pick="${n.id}" style="padding:8px 12px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s">
      <span class="node-status-dot ${n.status}" style="background:${st.color};width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:6px;color:#fff">${st.icon}</span>
      ${esc(n.name)}
    </div>`;
            }).join('');

            openModal(`
    <h2>${title}</h2>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">${description}</p>
    <div style="max-height:240px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:4px" id="m-pick-list">${listHtml}</div>
    <div class="actions"><button onclick="closeModal()">Cancel</button></div>
  `);

            modalEl.querySelectorAll('#m-pick-list .item').forEach(el => {
                el.addEventListener('mouseenter', () => el.style.background = '#f0f1f3');
                el.addEventListener('mouseleave', () => el.style.background = '');
                el.addEventListener('click', () => {
                    closeModal();
                    onPick(el.dataset.pick);
                });
            });
        }

        /* ── Connector context menu (remove link / insert node on edge) ── */
        svgEl.addEventListener('contextmenu', e => {
            const hit = e.target.closest('.connector-hit');
            if (!hit) return;
            e.preventDefault();
            e.stopPropagation();
            const parentId = hit.dataset.parent;
            const childId = hit.dataset.child;
            const parentNode = nodes.get(parentId);
            const childNode = nodes.get(childId);

            showCtxMenu(e.clientX, e.clientY, [
                {
                    label: 'Insert Node Here', icon: '↓', action: 'insert-edge', handler() {
                        showNodeModal({
                            title: 'Insert Node on Edge', onSave(n, s) {
                                const newId = createNode(n, s);
                                removeLink(parentId, childId);
                                addLink(parentId, newId);
                                addLink(newId, childId);
                                render();
                                fitViewIfNeeded();
                            }
                        });
                    }
                },
                {
                    label: `Remove Link (${esc(parentNode.name)} → ${esc(childNode.name)})`, icon: '✕', action: 'rm-link', danger: true, handler() {
                        removeLink(parentId, childId);
                        toast('Link removed');
                        render();
                    }
                }
            ]);
        });

        /* ── Close menus on outside click ── */
        document.addEventListener('click', e => {
            if (!e.target.closest('#ctx-menu')) hideCtxMenu();
        });

        /* ── Pan ── */
        wrapEl.addEventListener('mousedown', e => {
            if (e.target.closest('.node') || e.target.closest('#ctx-menu') || e.button !== 0) return;
            if (linkMode) return;
            isPanning = true;
            panStartX = e.clientX - panX;
            panStartY = e.clientY - panY;
            wrapEl.classList.add('grabbing');
        });
        window.addEventListener('mousemove', e => {
            if (!isPanning) return;
            didPan = true;
            panX = e.clientX - panStartX;
            panY = e.clientY - panStartY;
            applyTransform();
        });
        window.addEventListener('mouseup', () => { isPanning = false; wrapEl.classList.remove('grabbing'); });

        /* ── Zoom ── */
        wrapEl.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.08 : 0.08;
            const newScale = Math.min(2, Math.max(0.25, scale + delta));
            const rect = wrapEl.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            panX = mx - (mx - panX) * (newScale / scale);
            panY = my - (my - panY) * (newScale / scale);
            scale = newScale;
            applyTransform();
        }, { passive: false });

        /* ── Fit View ── */
        function fitView() {
            if (layoutCache.size === 0) return;
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const pos of layoutCache.values()) {
                if (pos.x < minX) minX = pos.x;
                if (pos.y < minY) minY = pos.y;
                if (pos.x + NODE_W > maxX) maxX = pos.x + NODE_W;
                if (pos.y + NODE_H > maxY) maxY = pos.y + NODE_H;
            }
            const treeW = maxX - minX, treeH = maxY - minY;
            const viewW = wrapEl.clientWidth - 80, viewH = wrapEl.clientHeight - 80;
            scale = Math.min(1.2, Math.min(viewW / Math.max(treeW, 1), viewH / Math.max(treeH, 1)));
            panX = (wrapEl.clientWidth - treeW * scale) / 2 - minX * scale;
            panY = (wrapEl.clientHeight - treeH * scale) / 2 - minY * scale;
            applyTransform();
        }

        function fitViewIfNeeded() {
            setTimeout(fitView, 50);
        }

        function focusNode(id) {
            const pos = layoutCache.get(id);
            if (!pos) return;
            const cx = pos.x + NODE_W / 2;
            const cy = pos.y + NODE_H / 2;
            panX = wrapEl.clientWidth / 2 - cx * scale;
            panY = wrapEl.clientHeight / 2 - cy * scale;
            canvasEl.style.transition = 'transform 0.25s ease';
            applyTransform();
            const onEnd = () => { canvasEl.style.transition = ''; canvasEl.removeEventListener('transitionend', onEnd); };
            canvasEl.addEventListener('transitionend', onEnd);
        }

        /* ── Toolbar Buttons ── */
        function addNodeHandler() {
            showNodeModal({
                title: 'Create Node', onSave(n, s) {
                    createNode(n, s);
                    render();
                    fitView();
                }
            });
        }

        document.getElementById('btn-add-node').addEventListener('click', addNodeHandler);
        document.getElementById('btn-add-node-empty').addEventListener('click', addNodeHandler);

        document.getElementById('btn-add-child').addEventListener('click', () => {
            if (!selectedId) return;
            showNodeModal({ title: 'Add Child Node', onSave(n, s) { addChild(selectedId, n, s); render(); fitViewIfNeeded(); } });
        });

        document.getElementById('btn-link').addEventListener('click', () => {
            if (!selectedId) return;
            enterLinkMode(selectedId);
        });

        document.getElementById('btn-insert-before').addEventListener('click', () => {
            if (!selectedId) return;
            showNodeModal({ title: 'Add Parent Node', onSave(n, s) { insertBefore(selectedId, n, s); render(); fitViewIfNeeded(); } });
        });

        document.getElementById('btn-edit').addEventListener('click', () => {
            if (!selectedId) return;
            const node = nodes.get(selectedId);
            showNodeModal({
                title: 'Edit Node', name: node.name, status: node.status,
                editId: selectedId,
                onSave(n, s) { renameNode(selectedId, n); setNodeStatus(selectedId, s); saveState(); render(); }
            });
        });

        document.getElementById('btn-delete').addEventListener('click', () => {
            if (!selectedId) return;
            showDeleteModal(selectedId);
        });

        document.getElementById('btn-fit').addEventListener('click', fitView);
        document.getElementById('btn-undo').addEventListener('click', undo);
        document.getElementById('btn-redo').addEventListener('click', redo);

        function updateOrientBtn() {
            const t = isVertical ? '↕ Vertical' : '↔ Horizontal';
            document.getElementById('btn-orient').textContent = t;
            document.querySelectorAll('[data-proxy="btn-orient"]').forEach(p => p.textContent = t);
        }
        updateOrientBtn();

        document.getElementById('btn-orient').addEventListener('click', () => {
            isVertical = !isVertical;
            localStorage.setItem('tree-graph-orientation', isVertical ? 'vertical' : 'horizontal');
            updateOrientBtn();
            render();
            fitView();
        });

        function updateThemeBtn() {
            const t = isDark ? '🌙 Dark' : '☀ Light';
            document.getElementById('btn-theme').textContent = t;
            document.querySelectorAll('[data-proxy="btn-theme"]').forEach(p => p.textContent = t);
        }
        updateThemeBtn();

        document.getElementById('btn-theme').addEventListener('click', () => {
            isDark = !isDark;
            _hlLight = null; _hlDark = null; // invalidate highlight cache
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            localStorage.setItem('tree-graph-theme', isDark ? 'dark' : 'light');
            updateThemeBtn();
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            if (nodes.size === 0) return;
            showConfirm('This will delete all nodes and links. Are you sure?', () => {
                nodes.clear(); selectedId = null; nextId = 1; saveState(); render(); fitViewIfNeeded();
            }, 'Clear All');
        });

        document.getElementById('btn-customize').addEventListener('click', showStatusCustomizer);

        /* ── Hamburger dropdowns ── */
        function closeAllDropdowns() {
            document.querySelectorAll('.tb-dropdown.open').forEach(d => d.classList.remove('open'));
        }

        document.querySelectorAll('.tb-hamburger-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const dd = btn.nextElementSibling;
                const wasOpen = dd.classList.contains('open');
                closeAllDropdowns();
                if (!wasOpen) dd.classList.add('open');
            });
        });

        document.querySelectorAll('[data-proxy]').forEach(proxy => {
            proxy.addEventListener('click', () => {
                closeAllDropdowns();
                const target = document.getElementById(proxy.dataset.proxy);
                if (target && !target.disabled) target.click();
            });
        });

        document.addEventListener('click', closeAllDropdowns);

        let legendCollapsed = false;
        document.getElementById('legend-toggle').addEventListener('click', () => {
            legendCollapsed = !legendCollapsed;
            document.getElementById('legend').classList.toggle('legend-collapsed', legendCollapsed);
            document.getElementById('legend-toggle').textContent = legendCollapsed ? '▲' : '▼';
        });

        document.getElementById('btn-import').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.addEventListener('change', () => {
                const file = input.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const data = JSON.parse(reader.result);
                        if (!data.nodes || !Array.isArray(data.nodes)) throw new Error('Invalid format');
                        nodes.clear();
                        for (const [id, node] of data.nodes) {
                            if (!node.parentIds) node.parentIds = node.parentId != null ? [node.parentId] : [];
                            delete node.parentId;
                            nodes.set(id, node);
                        }
                        if (data.statuses) { STATUSES.length = 0; STATUSES.push(...data.statuses); saveStatuses(); rebuildStatusMap(); }
                        if (data.nextId) nextId = data.nextId;
                        selectedId = null;
                        saveState(); render(); fitViewIfNeeded();
                        toast('Imported successfully');
                    } catch (err) {
                        toast('Import failed: ' + err.message);
                    }
                };
                reader.readAsText(file);
            });
            input.click();
        });

        document.getElementById('btn-export').addEventListener('click', () => {
            const data = { nodes: [...nodes.entries()], statuses: STATUSES, nextId };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'dev-manager-export.json';
            a.click();
            URL.revokeObjectURL(a.href);
            toast('Exported');
        });

        /* ── Keyboard Shortcuts ── */
        document.addEventListener('keydown', e => {
            if (modalOverlay.classList.contains('open')) return;
            if (e.key === 'Delete' && selectedId) showDeleteModal(selectedId);
            if (e.key === 'F2' && selectedId) {
                const node = nodes.get(selectedId);
                showNodeModal({
                    title: 'Edit Node', name: node.name, status: node.status,
                    editId: selectedId,
                    onSave(n, s) { renameNode(selectedId, n); setNodeStatus(selectedId, s); saveState(); render(); }
                });
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
        });

        /* ═══════════════════════════════════════════
           INIT
           ═══════════════════════════════════════════ */
        loadState();
        undoStack._last = getSnapshot();
        render();
        if (nodes.size > 0) setTimeout(fitView, 100);
    </script>
</body>

</html>
